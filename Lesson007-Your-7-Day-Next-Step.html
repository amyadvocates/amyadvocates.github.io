  <title>Lesson 7 — Your 7-Day Next Step</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple-deep: #5400FF;
      --purple-dark: #222C93;
      --purple-soft: #EDE9FF;
      --teal:        #0F6B6B;
      --teal-soft:   #E6F4F4;
      --amber:       #8A5200;
      --amber-soft:  #FFF8E6;
      --green:       #1A6640;
      --green-soft:  #EAF5EE;
      --bg:          #FAF8F4;
      --card:        #FFFFFF;
      --text:        #1A1A2E;
      --text-muted:  #6060A0;
      --border:      #E2DED8;
      --shadow:      0 2px 16px rgba(84,0,255,.07);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 60px;
    }
    #app {
      width: 100%;
      max-width: 680px;
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 32px 28px 36px;
    }

    /* Progress */
    .progress-wrap { display:flex; gap:6px; margin-bottom:28px; }
    .progress-dot {
      flex:1; height:5px; border-radius:99px;
      background: var(--border); transition: background .25s;
    }
    .progress-dot.done { background: var(--purple-deep); }
    .progress-dot.active { background: var(--purple-dark); opacity:.55; }

    /* Eyebrow / title */
    .lesson-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px;
    }
    .lesson-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 26px; line-height: 1.25; color: var(--text); margin-bottom: 8px;
    }
    .lesson-desc {
      font-size: 15px; line-height: 1.65; color: var(--text-muted); margin-bottom: 24px;
    }

    /* Option cards */
    .option-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .option-card {
      border: 2px solid var(--border);
      border-radius: 14px; padding: 14px 16px;
      cursor: pointer; transition: border-color .15s, background .15s;
      user-select: none;
    }
    .option-card:hover { border-color: var(--purple-dark); background: var(--purple-soft); }
    .option-card.selected { border-color: var(--purple-deep); background: var(--purple-soft); }
    .option-card[aria-checked="true"] { border-color: var(--purple-deep); background: var(--purple-soft); }
    .option-label { font-size: 15px; font-weight: 600; color: var(--text); }
    .option-hint  { font-size: 13px; color: var(--text-muted); margin-top: 3px; }

    /* Text areas / inputs */
    .field-label {
      font-size: 13px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .05em;
      margin-bottom: 5px; margin-top: 18px; display: block;
    }
    .field-hint {
      font-size: 13px; color: var(--text-muted); font-style: italic;
      margin-bottom: 6px; line-height: 1.5;
    }
    .obs-area {
      width: 100%; border: 2px solid var(--border); border-radius: 12px;
      padding: 12px 14px; font-size: 14px; font-family: 'Inter', sans-serif;
      color: var(--text); background: #FAFAFA; resize: vertical;
      transition: border-color .15s; line-height: 1.6;
    }
    .obs-area:focus { outline: none; border-color: var(--purple-dark); }

    /* Callout */
    .callout {
      border-radius: 12px; padding: 14px 16px; margin-bottom: 20px;
      font-size: 14px; line-height: 1.6;
    }
    .callout-teal  { background: var(--teal-soft);  border-left: 4px solid var(--teal); }
    .callout-amber { background: var(--amber-soft);  border-left: 4px solid var(--amber); }
    .callout-purple { background: var(--purple-soft); border-left: 4px solid var(--purple-deep); }
    .callout strong { display: block; margin-bottom: 4px; }

    /* Examples list */
    .examples-label {
      font-size: 12px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .05em;
      margin: 14px 0 6px;
    }
    .examples-grid {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px;
    }
    .example-chip {
      font-size: 12px; background: var(--purple-soft); border-radius: 99px;
      padding: 4px 12px; color: var(--purple-dark); cursor: pointer;
      border: 1.5px solid transparent; transition: border-color .12s;
    }
    .example-chip:hover { border-color: var(--purple-dark); }

    /* Toggle pills — all options shown; selected ones are highlighted */
    .toggle-chip {
      font-size: 12px; background: #fff; border-radius: 99px;
      padding: 4px 12px; color: var(--text-muted); cursor: pointer;
      border: 1.5px solid var(--border);
      transition: border-color .12s, background .12s, color .12s;
      user-select: none;
    }
    .toggle-chip:hover { border-color: var(--purple-dark); color: var(--purple-dark); }
    .toggle-chip.selected {
      background: var(--purple-soft); border-color: var(--purple-deep);
      color: var(--purple-dark); font-weight: 600;
    }
    .toggle-chip:focus-visible { outline: 2px solid var(--purple-deep); outline-offset: 2px; }

    /* Map screen */
    .map-section {
      background: var(--purple-soft); border-radius: 14px;
      padding: 16px 18px; margin-bottom: 12px;
    }
    .map-section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--purple-dark); margin-bottom: 4px;
    }
    .map-section-hint {
      font-size: 12px; color: var(--text-muted); font-style: italic;
      margin-bottom: 8px;
    }
    .map-value {
      font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.5;
    }
    .map-value-muted { color: var(--text-muted); font-style: italic; font-weight: 400; }

    /* Pathway badge */
    .pathway-badge {
      display: inline-block; padding: 6px 16px; border-radius: 99px;
      font-size: 14px; font-weight: 700; margin-top: 4px;
    }
    .badge-giw { background: var(--teal-soft);   color: var(--teal); }
    .badge-sw  { background: var(--green-soft);  color: var(--green); }
    .badge-rd  { background: var(--purple-soft); color: var(--purple-dark); }
    .badge-stabilise { background: var(--amber-soft); color: var(--amber); }
    .badge-unsure { background: #F5F5F5; color: #666; }

    /* CTA */
    .cta-section { margin-top: 28px; }
    .cta-item {
      border: 2px solid var(--border); border-radius: 14px;
      padding: 16px 18px; margin-bottom: 10px;
    }
    .cta-item-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .cta-item-desc  { font-size: 13px; color: var(--text-muted); line-height: 1.55; }

    /* Community section */
    .community-section { background: var(--purple-soft); border-radius: 14px; padding: 18px; margin-top: 24px; }
    .community-label   { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--purple-dark); margin-bottom: 8px; }
    .community-prompt  { font-size: 15px; font-style: italic; color: var(--text); line-height: 1.6; margin-bottom: 6px; }

    /* Navigation */
    .nav-buttons { display:flex; gap:10px; margin-top:28px; flex-wrap:wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 12px 22px; border-radius: 99px; font-size: 15px;
      font-weight: 600; cursor: pointer; border: none;
      font-family: 'Inter', sans-serif; transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--purple-deep); color: #FFF; flex:1; justify-content:center; }
    .btn-ghost   { background: transparent; border: 2px solid var(--border); color: var(--text); }
    .btn-sm      { padding: 9px 18px; font-size: 13px; }
    .save-badge  { font-size: 12px; color: var(--text-muted); text-align:center; margin-top:10px; }

    hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    /* ── Brand header ── */
    .brand-header {
      display: flex; align-items: center; gap: 12px;
      width: 100%; max-width: 680px;
      padding: 0 0 16px;
      border-bottom: 2px solid var(--purple-soft);
      margin-bottom: 20px;
    }
    .brand-mark {
      width: 40px; height: 40px;
      background: var(--purple-deep); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .brand-text { display: flex; flex-direction: column; }
    .brand-name {
      font-size: 13px; font-weight: 700; color: var(--purple-deep);
      letter-spacing: 0.06em; text-transform: uppercase; line-height: 1.3;
    }
    .brand-sub { font-size: 13px; color: var(--text-muted); }
    .lesson-badge {
      margin-left: auto;
      background: var(--purple-soft); color: var(--purple-deep);
      font-size: 13px; font-weight: 700;
      padding: 6px 12px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0;
    }
    @media print { .brand-header { display: none; } }
  </style>
</head>

<script>
/* ── Constants ────────────────────────────────────────────────────────────── */
const STORAGE_KEY = 'ndw_lesson7_v1';
const SCREENS = ['step1', 'step2', 'step3', 'map'];

const PATHWAY_LABELS = {
  giw:       'Getting Into Work',
  sw:        'Staying Well at Work',
  rd:        'Redesigning Your Career',
  stabilise: 'Stabilise First',
  unsure:    'Still figuring out',
};

const PATHWAY_BADGE = {
  giw:       'badge-giw',
  sw:        'badge-sw',
  rd:        'badge-rd',
  stabilise: 'badge-stabilise',
  unsure:    'badge-unsure',
};

const PATHWAY_OPTIONS = [
  { value: 'giw',       label: 'Getting Into Work',       hint: 'Finding work that fits and building a sustainable job search' },
  { value: 'sw',        label: 'Staying Well at Work',    hint: 'Building support, adjustments, and protection in my current role' },
  { value: 'rd',        label: 'Redesigning Your Career', hint: 'Something more fundamental needs to change — the direction, not just the details' },
  { value: 'stabilise', label: 'Stabilise First',         hint: 'My capacity is too low right now for bigger career decisions' },
  { value: 'unsure',    label: 'Still figuring out',      hint: 'I\'m not sure yet — and that\'s okay' },
];

const EXAMPLES_BY_PATHWAY = {
  giw: [
    'Add "written instructions" to my job-search criteria',
    'Identify three roles that suit my working style',
    'Draft one paragraph of a covering letter',
    'Research one company\'s accessibility or flexibility policies',
  ],
  sw: [
    'Draft one paragraph of an adjustments request',
    'Book a 15-minute conversation with my manager',
    'Identify one task to reduce, delegate, or remove',
    'Block one hour of protected focus time this week',
  ],
  rd: [
    'List five things I\'d want in a redesigned role',
    'Identify one transferable strength I haven\'t used recently',
    'Research one career direction I\'ve been curious about',
    'Talk to one person who has made a similar change',
  ],
  stabilise: [
    'Identify one demand I can reduce or remove this week',
    'Protect one block of genuine rest time',
    'Track what\'s costing me most energy for three days',
    'Post one question in the community',
  ],
  unsure: [
    'Re-read my Lesson 6 pathway result',
    'Post a question in the community',
    'Book a triage call',
    'Track my energy levels for three days',
  ],
};

/* ── State ────────────────────────────────────────────────────────────────── */
function defaultState() {
  return {
    screen:      'step1',
    pathway:     '',
    biggestIssue:'',
    nextStep:    '',
    whySmall:    '',
    support:     '',
    barrier:     '',
    backup:      '',
    willKnow:    '',
    conditions:  '',
    frictionPts: '',
    accessNeeds: '',
    autoFilled:  {},
  };
}

let state = defaultState();
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) state = Object.assign(defaultState(), JSON.parse(saved));
} catch(e) {}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

/* ── Pull-through from earlier lessons ────────────────────────────────────── */
const L3_DOMAINS = {
  1:'Energy and Capacity', 2:'Sensory Environment', 3:'Executive Function',
  4:'Communication and Processing', 5:'Social and Emotional Load',
  6:'Predictability and Uncertainty', 7:'Autonomy and Control',
  8:'Values and Motivation', 9:'Recovery and Regulation', 10:'Support and Safety',
};

function readKey(key) {
  try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch(e) { return null; }
}

// Lesson 3 domains matching the given ratings, in the order the ratings are listed
function lesson3Domains(ratingValues) {
  const d = readKey('ndw_lesson3_audit_v1');
  if (!d || !d.ratings) return [];
  const out = [];
  ratingValues.forEach(rv => {
    Object.keys(L3_DOMAINS).forEach(id => {
      if (d.ratings[id] === rv) out.push(L3_DOMAINS[id]);
    });
  });
  return out;
}

// Access needs gathered from Lesson 4 (top 3 needs) and Lesson 5 (starter list)
function pulledAccessNeeds() {
  const out = [];
  const seen = new Set();
  const add = v => {
    v = (v || '').trim();
    if (v && !seen.has(v.toLowerCase())) { seen.add(v.toLowerCase()); out.push(v); }
  };
  const l4 = readKey('ndw_lesson4_v1');
  if (l4) (l4.top3Needs || []).forEach(add);
  const l5 = readKey('ndw_lesson5_v1');
  if (l5) (l5.starterList || []).forEach(add);
  return out;
}

// Suggested pathway from the Lesson 6 result
function lesson6SuggestedPathway() {
  const d = readKey('ndw_lesson6_v1');
  const r = d && d.savedResult;
  if (!r) return null;
  if (r.stabiliseFirst) return 'stabilise';
  if (r.primary === 'unclear') return 'unsure';
  return ['giw','sw','rd'].includes(r.primary) ? r.primary : null;
}

// Pre-fill from earlier lessons. Each field is only auto-filled once —
// if the user edits or clears it afterwards, their version is kept.
let pathwayPrefilled = false;
function applyPrefills() {
  if (!state.autoFilled) state.autoFilled = {};
  if (!state.pathway) {
    const suggested = lesson6SuggestedPathway();
    if (suggested) { state.pathway = suggested; pathwayPrefilled = true; saveState(); }
  }
  const prefillField = (key, candidates, max) => {
    if (state.autoFilled[key] || (state[key] || '').trim()) return;
    const vals = (candidates || []).slice(0, max);
    if (!vals.length) return;
    state[key] = vals.join(', ');
    state.autoFilled[key] = true;
    saveState();
  };
  prefillField('biggestIssue', lesson3Domains(['unsustainable','costly']), 1);
  prefillField('conditions',   lesson3Domains(['works_well','manageable']), 3);
  prefillField('frictionPts',  lesson3Domains(['unsustainable','costly']), 3);
  prefillField('accessNeeds',  pulledAccessNeeds(), 3);
}
applyPrefills();

// All ten audit domains, most relevant first (by the given rating priority)
function allDomainsOrdered(priorityRatings) {
  const d = readKey('ndw_lesson3_audit_v1');
  const ratings = (d && d.ratings) ? d.ratings : {};
  const rank = r => { const i = priorityRatings.indexOf(r); return i === -1 ? priorityRatings.length : i; };
  return Object.keys(L3_DOMAINS)
    .map(id => ({ name: L3_DOMAINS[id], r: ratings[id] }))
    .sort((a, b) => rank(a.r) - rank(b.r))
    .map(x => x.name);
}

// Toggle pills for a textarea field: every option is shown, the ones already
// in the field are highlighted, and tapping adds or removes them. The field
// itself stays free text.
function renderTogglePills(fieldKey, candidates, label) {
  const cands = (candidates || []).filter(Boolean);
  if (!cands.length) return '';
  const current = (state[fieldKey] || '').toLowerCase();
  return `
    <p class="examples-label">${escHtml(label)}</p>
    <div class="examples-grid">
      ${cands.map(c => {
        const sel = current.includes(c.toLowerCase());
        return `<span class="toggle-chip${sel ? ' selected' : ''}" role="button" tabindex="0" aria-pressed="${sel}"
          data-toggle-chip="${escHtml(fieldKey)}" data-chip-val="${escHtml(c)}">${sel ? '✓' : '+'} ${escHtml(c)}</span>`;
      }).join('')}
    </div>`;
}

// Add or remove a pill's value from the field, preserving anything
// the user has typed around it
function togglePillValue(key, val) {
  const cur = state[key] || '';
  const idx = cur.toLowerCase().indexOf(val.toLowerCase());
  if (idx >= 0) {
    state[key] = (cur.slice(0, idx) + cur.slice(idx + val.length))
      .replace(/\s*,\s*,\s*/g, ', ')
      .replace(/^\s*,\s*/, '')
      .replace(/\s*,\s*$/, '')
      .trim();
  } else {
    const base = cur.trim().replace(/[,;]\s*$/, '');
    state[key] = base ? base + ', ' + val : val;
  }
  saveState();
  render();
}

/* ── Helpers ──────────────────────────────────────────────────────────────── */
function escHtml(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function captureValues() {
  ['biggestIssue','nextStep','whySmall','support','barrier','backup','willKnow','conditions','frictionPts','accessNeeds']
    .forEach(k => {
      const el = document.getElementById('field-' + k);
      if (el) state[k] = el.value;
    });
}

function goTo(screen) {
  captureValues();
  state.screen = screen;
  saveState();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── Progress ─────────────────────────────────────────────────────────────── */
function renderProgress(current) {
  return `<div class="progress-wrap" role="progressbar" aria-label="Progress">
    ${SCREENS.map(s => {
      const idx = SCREENS.indexOf(s);
      const cur = SCREENS.indexOf(current);
      const cls = idx < cur ? 'done' : idx === cur ? 'active' : '';
      return `<div class="progress-dot ${cls}"></div>`;
    }).join('')}
  </div>`;
}

/* ── Render ───────────────────────────────────────────────────────────────── */
function render() {
  const app = document.getElementById('app');
  switch (state.screen) {
    case 'step2': app.innerHTML = renderStep2(); break;
    case 'step3': app.innerHTML = renderStep3(); break;
    case 'map':   app.innerHTML = renderMap();   break;
    default:      app.innerHTML = renderStep1();
  }
  attachListeners();

  // Persist any textarea changes on input
  ['biggestIssue','nextStep','whySmall','support','barrier','backup','willKnow','conditions','frictionPts','accessNeeds']
    .forEach(k => {
      const el = document.getElementById('field-' + k);
      if (el) el.addEventListener('input', () => { state[k] = el.value; saveState(); });
    });
}

/* ── Listeners ────────────────────────────────────────────────────────────── */
function attachListeners() {
  // Pathway radio cards
  const pathwayContainer = document.getElementById('options-pathway');
  if (pathwayContainer) {
    pathwayContainer.querySelectorAll('.option-card').forEach(card => {
      card.addEventListener('click', () => {
        state.pathway = card.dataset.value;
        saveState();
        pathwayContainer.querySelectorAll('.option-card').forEach(c => {
          const sel = c.dataset.value === state.pathway;
          c.classList.toggle('selected', sel);
          c.setAttribute('aria-checked', sel);
        });
        const btn = document.getElementById('btn-next');
        if (btn) btn.disabled = false;
      });
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); }
      });
    });
  }

  // Example chips
  document.querySelectorAll('.example-chip[data-example]').forEach(chip => {
    chip.addEventListener('click', () => {
      captureValues();
      state.nextStep = chip.dataset.example;
      saveState();
      const el = document.getElementById('field-nextStep');
      if (el) { el.value = state.nextStep; el.focus(); }
    });
  });

  // Toggle pills — add or remove the value from their field
  document.querySelectorAll('[data-toggle-chip]').forEach(chip => {
    const activate = () => {
      captureValues();
      togglePillValue(chip.dataset.toggleChip, chip.dataset.chipVal);
    };
    chip.addEventListener('click', activate);
    chip.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activate(); }
    });
  });

  // Navigation
  const btnNext = document.getElementById('btn-next');
  if (btnNext) {
    btnNext.addEventListener('click', () => {
      captureValues();
      const idx = SCREENS.indexOf(state.screen);
      if (idx < SCREENS.length - 1) goTo(SCREENS[idx + 1]);
    });
  }

  const btnBack = document.getElementById('btn-back');
  if (btnBack) {
    btnBack.addEventListener('click', () => {
      captureValues();
      const idx = SCREENS.indexOf(state.screen);
      if (idx > 0) goTo(SCREENS[idx - 1]);
    });
  }

  const btnPdf = document.getElementById('btn-pdf');
  if (btnPdf) btnPdf.addEventListener('click', () => window.print());

  const btnRestart = document.getElementById('btn-restart');
  if (btnRestart) {
    btnRestart.addEventListener('click', () => {
      if (confirm('This will clear all your answers. Are you sure?')) {
        localStorage.removeItem(STORAGE_KEY);
        state = defaultState();
        applyPrefills();
        render();
      }
    });
  }
}

render();
