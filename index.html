    <style>
      :root {
        --text: #1f1f1f;
        --muted: #666666;
        --line: #d9d9d9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--text);
        background: #ffffff;
        font-family: Georgia, "Times New Roman", serif;
      }

      main {
        width: min(100%, 520px);
      }

      p {
        margin: 0;
        line-height: 1.6;
      }

      .eyebrow {
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--line);
        font-size: 0.9rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(2rem, 6vw, 3.5rem);
        line-height: 1;
        font-weight: 700;
      }

      .subtle {
        color: var(--muted);
      }
    </style>

    <main>
      <p class="eyebrow">Amy Walker</p>
