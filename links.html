    <style>
      .linktree-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 60px 24px 80px;
        background: #ffffff;
      }

      .linktree-logo {
        margin-bottom: 32px;
      }

      .linktree-logo img {
        height: 140px;
        width: auto;
        display: block;
      }

      .linktree-name {
        font-family: "Fraunces", serif;
        font-size: clamp(2rem, 7vw, 3rem);
        font-weight: 700;
        color: var(--text);
        margin: 0 0 12px;
        text-align: center;
        letter-spacing: -0.01em;
      }

      .linktree-bio {
        font-family: "Outfit", sans-serif;
        font-size: clamp(1.1rem, 3vw, 1.3rem);
        color: var(--muted);
        text-align: center;
        margin: 0 0 48px;
        max-width: 420px;
        line-height: 1.6;
      }

      .linktree-links {
        display: flex;
        flex-direction: column;
        gap: 16px;
        width: 100%;
        max-width: 480px;
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .linktree-links li {
        width: 100%;
      }

      .linktree-link {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 18px 28px;
        font-family: "Outfit", sans-serif;
        font-size: clamp(1.1rem, 3vw, 1.25rem);
        font-weight: 600;
        color: var(--text);
        background: #ffffff;
        border: 2px solid var(--text);
        text-decoration: none;
        text-align: center;
        transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease, transform 0.12s ease;
        line-height: 1.3;
      }

      .linktree-link:hover,
      .linktree-link:focus-visible {
        background: var(--accent);
        border-color: var(--accent);
        color: #ffffff;
        transform: translateY(-2px);
        outline: none;
      }

      .linktree-link:active {
        transform: translateY(0);
      }

      .linktree-footer {
        margin-top: 56px;
        text-align: center;
        font-family: "Outfit", sans-serif;
        font-size: 1rem;
        color: var(--muted);
      }

      .linktree-footer a {
        color: var(--muted);
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      .linktree-footer a:hover {
        color: var(--accent);
      }
