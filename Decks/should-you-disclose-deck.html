function getSlideTitle(slide) {
  if (!slide) return '';
  switch (slide.type) {
    case 'cover':      return slide.titleA + ' ' + slide.titleB;
    case 'statement':  return slide.statement;
    case 'question':   return 'Q' + slide.questionNum + ': ' + slide.question;
    case 'concerns':   return slide.prompt;
    case 'nextstep':   return slide.statement;
    case 'closure':    return 'Before We Finish';
    case 'disclaimer': return 'Workshop Information';
    default:           return slide.title || slide.headline || slide.statement || '';
  }
}

function getSlideLabel(slide) {
  if (!slide) return '';
  return slide.eyebrow || slide.type.charAt(0).toUpperCase() + slide.type.slice(1);
}

}

        padding:"clamp(12px,1.8cqi,22px) clamp(16px,2.4cqi,28px)" }}>

// ─── RENDERER ────────────────────────────────────────────────────────────────

function SlideRenderer({ slide }) {
  const accent = ACCENTS[slide.accent] || ACCENTS.purple;
  switch (slide.type) {
    case "cover":        return <SlideCover slide={slide} accent={accent} />;
    case "agenda":       return <SlideAgenda slide={slide} accent={accent} />;
    case "continuum":    return <SlideContinuum slide={slide} accent={accent} />;
    case "twodecisions": return <SlideTwoDecisions slide={slide} accent={accent} />;
    case "reflection":   return <SlideReflection slide={slide} accent={accent} />;
    case "statement":    return <SlideStatement slide={slide} accent={accent} />;
    case "question":     return <SlideQuestion slide={slide} accent={accent} />;
    case "content":      return <SlideContent slide={slide} accent={accent} />;
    case "structures":   return <SlideStructures slide={slide} accent={accent} />;
    case "scale":        return <SlideScale slide={slide} accent={accent} />;
    case "matrix":       return <SlideMatrix slide={slide} accent={accent} />;
    case "threecards":   return <SlideThreeCards slide={slide} accent={accent} />;
    case "pathway":      return <SlidePathway slide={slide} accent={accent} />;
    case "fourcards":    return <SlideFourCards slide={slide} accent={accent} />;
    case "benefitcards": return <SlideBenefitCards slide={slide} accent={accent} />;
    case "concerns":     return <SlideConcerns slide={slide} accent={accent} />;
    case "urgency":      return <SlideUrgency slide={slide} accent={accent} />;
    case "routes":       return <SlideRoutes slide={slide} accent={accent} />;
    case "twocolumn":    return <SlideTwoColumn slide={slide} accent={accent} />;
    case "nextstep":     return <SlideNextStep slide={slide} accent={accent} />;
    case "closure":      return <SlideClosure slide={slide} accent={accent} />;
    case "disclaimer":   return <SlideDisclaimer slide={slide} accent={accent} />;
    default:             return null;
  }
}

// ─── PRINT LAYER ─────────────────────────────────────────────────────────────

function PrintSlides() {
  return (
    <div className="hide-on-screen" aria-hidden="true">
      {SLIDES.map((slide, i) => (
        <div key={i} className="print-slide">
          <SlideRenderer slide={slide} />
        </div>
      ))}
    </div>
  );
}

// ─── PRESENTATION APP ────────────────────────────────────────────────────────

function Presentation() {
  const [currentSlide, setCurrentSlide] = useState(0);
  const [showNotes, setShowNotes]       = useState(false);
  const [fullscreen, setFullscreen]     = useState(false);
  const containerRef = useRef(null);
  const total   = SLIDES.length;
  const slide   = SLIDES[currentSlide];
  const progress= ((currentSlide + 1) / total) * 100;
  const accent  = ACCENTS[slide.accent] || ACCENTS.purple;
  const isDark  = slide.type === "statement" && slide.dark;

  const goNext = () => setCurrentSlide(i => Math.min(total-1, i+1));
  const goPrev = () => setCurrentSlide(i => Math.max(0, i-1));

  const enterFullscreen = useCallback(async () => {
    setFullscreen(true);
    try {
      const el = document.documentElement;
      if (el.requestFullscreen) await el.requestFullscreen();
      else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
    } catch (e) {}
  }, []);

  const exitFullscreen = useCallback(async () => {
    setFullscreen(false);
    try {
      if (document.fullscreenElement) await document.exitFullscreen();
      else if (document.webkitFullscreenElement) await document.webkitExitFullscreen();
    } catch (e) {}
  }, []);

  useEffect(() => {
    const onFSChange = () => {
      if (!document.fullscreenElement && !document.webkitFullscreenElement)
        setFullscreen(false);
    };
    document.addEventListener("fullscreenchange", onFSChange);
    document.addEventListener("webkitfullscreenchange", onFSChange);
    return () => {
      document.removeEventListener("fullscreenchange", onFSChange);
      document.removeEventListener("webkitfullscreenchange", onFSChange);
    };
  }, []);

  // Broadcast slide index to presenter popup
  useEffect(() => {
    if (syncChannel) syncChannel.postMessage({ type: 'slide', index: currentSlide });
  }, [currentSlide]);

  // Listen for navigation commands from presenter
  useEffect(() => {
    if (!syncChannel) return;
    const handler = (e) => { if (e.data.type === 'nav') setCurrentSlide(e.data.index); };
    syncChannel.addEventListener('message', handler);
    return () => syncChannel.removeEventListener('message', handler);
  }, []);

  useEffect(() => {
    function handleKey(e) {
      if (!containerRef.current) return;
      if (!containerRef.current.contains(document.activeElement) &&
          !containerRef.current.matches(":hover")) return;
      if (["INPUT","TEXTAREA"].includes(document.activeElement?.tagName)) return;
      if (e.key==="ArrowRight"||e.key===" ") { e.preventDefault(); goNext(); }
      else if (e.key==="ArrowLeft")  { e.preventDefault(); goPrev(); }
      else if (e.key==="Home")       { e.preventDefault(); setCurrentSlide(0); }
      else if (e.key==="End")        { e.preventDefault(); setCurrentSlide(total-1); }
      else if (e.key==="f"||e.key==="F") { e.preventDefault(); fullscreen?exitFullscreen():enterFullscreen(); }
      else if (e.key==="n"||e.key==="N") { e.preventDefault(); setShowNotes(v=>!v); }
    }
    window.addEventListener("keydown", handleKey);
    return () => window.removeEventListener("keydown", handleKey);
  }, [total, fullscreen, enterFullscreen, exitFullscreen]);

  const btnBase = { fontFamily:"'Inter',sans-serif", fontSize:11, fontWeight:700,
    letterSpacing:1.5, textTransform:"uppercase", cursor:"pointer", minHeight:44,
    display:"flex", alignItems:"center", gap:6, borderRadius:6, padding:"10px 18px" };

  const slideFrame = (
    <div style={{ position:"relative", width:"100%", borderRadius:fullscreen?0:10,
      overflow:"hidden", aspectRatio:"16/9", containerType:"inline-size",
      boxShadow:fullscreen?"none":"0 6px 24px rgba(31,61,55,0.18)" }}>
      <SlideRenderer slide={slide} />
      <div style={{ position:"absolute", bottom:10, right:14, fontFamily:"'Inter',sans-serif",
        fontSize:10, letterSpacing:2, color:isDark?"rgba(255,255,255,0.7)":C.muted, fontWeight:600,
        background:isDark?"rgba(0,0,0,0.25)":"rgba(250,248,244,0.8)", padding:"3px 9px",
        borderRadius:4, backdropFilter:"blur(4px)" }}>
        {String(currentSlide+1).padStart(2,"0")} / {String(total).padStart(2,"0")}
      </div>
    </div>
  );

  return (
    <>
      <div ref={containerRef} className="hide-on-print"
        style={{ background:C.bg, minHeight:"100vh", padding:"clamp(14px,2.5vw,28px)" }}>

        {fullscreen && (
          <div style={{ position:"fixed", inset:0, background:"#0d1f1c", zIndex:1000,
            display:"flex", flexDirection:"column" }} role="dialog" aria-label="Fullscreen presentation">
            <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center" }}>
              <div style={{ width:"min(100vw, calc((100vh - 84px) * 16 / 9))", aspectRatio:"16/9" }}>
                {slideFrame}
              </div>
            </div>
            <div style={{ padding:18, background:"rgba(0,0,0,0.5)", display:"flex",
              alignItems:"center", justifyContent:"space-between", gap:14, color:C.white }}>
              <button className="nw-btn" onClick={goPrev} disabled={currentSlide===0} style={{
                ...btnBase, background:"rgba(255,255,255,0.08)", color:C.white,
                border:"1px solid rgba(255,255,255,0.18)", opacity:currentSlide===0?0.4:1,
                cursor:currentSlide===0?"not-allowed":"pointer" }}>← Prev</button>
              <span style={{ fontFamily:"'Inter',sans-serif", fontSize:12, letterSpacing:2, fontWeight:700 }}>
                {currentSlide+1} / {total}
              </span>
              <div style={{ display:"flex", gap:8 }}>
                <button className="nw-btn" onClick={exitFullscreen} style={{
                  ...btnBase, background:"rgba(255,255,255,0.08)", color:C.white,
                  border:"1px solid rgba(255,255,255,0.18)" }}>Exit (Esc)</button>
                <button className="nw-btn" onClick={goNext} disabled={currentSlide===total-1} style={{
                  ...btnBase, background:C.purple, color:C.white, border:"none",
                  opacity:currentSlide===total-1?0.4:1,
                  cursor:currentSlide===total-1?"not-allowed":"pointer" }}>Next →</button>
              </div>
            </div>
            <div style={{ height:4, background:"rgba(255,255,255,0.08)" }}
              role="progressbar" aria-valuenow={currentSlide+1} aria-valuemin={1} aria-valuemax={total}>
              <div style={{ width:`${progress}%`, height:"100%", background:accent, transition:"width 0.3s ease" }} />
            </div>
          </div>
        )}

        <main style={{ background:C.white, border:`1px solid ${C.border}`, borderRadius:14,
          overflow:"hidden", boxShadow:"0 4px 18px rgba(31,61,55,0.09)", maxWidth:1200, margin:"0 auto" }}>

          <header style={{ background:C.dark, padding:"16px 20px", display:"flex",
            alignItems:"center", justifyContent:"space-between", gap:12, flexWrap:"wrap",
            backgroundImage:"radial-gradient(ellipse at 85% 50%, rgba(84,0,255,0.12) 0%, transparent 60%)" }}>
            <div>
              <div style={{ fontFamily:"'Inter',sans-serif", fontSize:10, letterSpacing:2.5,
                color:C.lavender, textTransform:"uppercase", fontWeight:600 }}>
                Neurodiversity Works · {total} Slides
              </div>
              <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:18,
                fontWeight:700, color:C.white, marginTop:2 }}>Should You Disclose? — Workshop Deck</div>
            </div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              <button className="nw-btn" onClick={()=>setShowNotes(!showNotes)} aria-pressed={showNotes} style={{
                ...btnBase, background:showNotes?C.purple:"transparent",
                color:showNotes?C.white:"rgba(255,255,255,0.8)",
                border:`1px solid ${showNotes?C.purple:"rgba(255,255,255,0.22)"}` }}>
                <span aria-hidden="true">✎</span> Notes
              </button>
              <button className="nw-btn" onClick={() => window.print()} style={{
                ...btnBase, background:"transparent", color:"rgba(255,255,255,0.8)",
                border:"1px solid rgba(255,255,255,0.22)" }}
                title="Save all slides as PDF">
                <span aria-hidden="true">⬇</span> Download PDF
              </button>
              <button className="nw-btn" onClick={() => {
                const url = window.location.href.replace(/[?&]presenter/,'') + (window.location.href.includes('?') ? '&presenter' : '?presenter');
                window.open(url, 'nw-presenter', 'width=960,height=660,left=0,top=0,menubar=no,toolbar=no,location=no,status=no');
              }} style={{ ...btnBase, background:"rgba(255,255,255,0.1)", color:C.white,
                border:"1px solid rgba(255,255,255,0.22)" }}>
                <span aria-hidden="true">🖥</span> Presenter
              </button>
              <button className="nw-btn" onClick={enterFullscreen} style={{
                ...btnBase, background:C.purple, color:C.white, border:"none" }}>
                <span aria-hidden="true">⛶</span> Fullscreen
              </button>
            </div>
          </header>

          <div style={{ padding:"clamp(16px,3vw,28px)", background:C.card }}>
            {slideFrame}
            <div style={{ height:3, background:C.border, borderRadius:2, marginTop:14, overflow:"hidden" }}
              role="progressbar" aria-valuenow={currentSlide+1} aria-valuemin={1} aria-valuemax={total}>
              <div style={{ width:`${progress}%`, height:"100%", background:C.purple,
                transition:"width 0.3s ease", boxShadow:`0 0 8px ${C.purple}80` }} />
            </div>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
              gap:12, marginTop:14, flexWrap:"wrap" }}>
              <button className="nw-btn" onClick={goPrev} disabled={currentSlide===0} style={{
                ...btnBase, background:currentSlide===0?C.bg:C.white, color:C.dark,
                border:`1px solid ${C.border}`, opacity:currentSlide===0?0.4:1,
                cursor:currentSlide===0?"not-allowed":"pointer" }}>← Previous</button>
              <span style={{ fontFamily:"'Inter',sans-serif", fontSize:11, letterSpacing:2,
                color:C.muted, fontWeight:600, textTransform:"uppercase" }}>
                Slide {currentSlide+1} of {total}
              </span>
              <button className="nw-btn" onClick={goNext} disabled={currentSlide===total-1} style={{
                ...btnBase, background:currentSlide===total-1?C.bg:accent,
                color:currentSlide===total-1?C.muted:C.white,
                border:`1px solid ${currentSlide===total-1?C.border:accent}`,
                opacity:currentSlide===total-1?0.5:1,
                cursor:currentSlide===total-1?"not-allowed":"pointer" }}>Next →</button>
            </div>
          </div>

          {showNotes && (
            <div style={{ padding:"20px 24px", background:C.bg, borderTop:`1px solid ${C.border}` }}
              role="region" aria-label="Speaker notes">
              <div style={{ fontFamily:"'Inter',sans-serif", fontSize:10, letterSpacing:2.5,
                color:C.purple, textTransform:"uppercase", fontWeight:700, marginBottom:8 }}>
                Speaker Notes · Slide {currentSlide+1}
              </div>
              <p style={{ margin:0, fontFamily:"'Inter',sans-serif",
                fontSize:14, color:C.dark, lineHeight:1.65 }}>
                {slide.notes || "No notes for this slide."}
              </p>
            </div>
          )}

          <div style={{ padding:"14px 18px", background:C.white, borderTop:`1px solid ${C.border}`,
            overflowX:"auto" }}>
            <div role="tablist" aria-label="Slide navigator"
              style={{ display:"flex", gap:6, minWidth:"max-content" }}>
              {SLIDES.map((s,i) => {
                const active = i===currentSlide;
                const a = ACCENTS[s.accent]||ACCENTS.purple;
                const isDkSlide = s.type === "statement" && s.dark;
                return (
                  <button key={i} role="tab" aria-selected={active} className="nw-btn"
                    aria-label={`Slide ${i+1}`}
                    onClick={() => setCurrentSlide(i)}
                    style={{ fontFamily:"'Inter',sans-serif", fontSize:10, fontWeight:700,
                      letterSpacing:1.5, cursor:"pointer", minHeight:36, minWidth:40,
                      padding:"5px 10px", border:`2px solid ${active?a:C.border}`,
                      background:active?C.dark:isDkSlide?C.dark:"transparent",
                      color:active?C.white:isDkSlide?"rgba(255,255,255,0.6)":C.muted,
                      borderRadius:6, transition:"all 0.15s" }}>
                    {i+1}
                  </button>
                );
              })}
            </div>
          </div>
        </main>
      </div>
      <PrintSlides />
    </>
  );
}


// ─── PRESENTER VIEW ───────────────────────────────────────────────────────────

function PresenterView() {
  const [slideIndex, setSlideIndex] = useState(0);
  const [elapsed, setElapsed]       = useState(0);
  const [running, setRunning]       = useState(false);

  // Listen for slide changes broadcast from main deck
  useEffect(() => {
    if (!syncChannel) return;
    const handler = (e) => {
      if (e.data.type === 'slide') setSlideIndex(e.data.index);
    };
    syncChannel.addEventListener('message', handler);
    return () => syncChannel.removeEventListener('message', handler);
  }, []);

  // Timer
  useEffect(() => {
    if (!running) return;
    const id = setInterval(() => setElapsed(t => t + 1), 1000);
    return () => clearInterval(id);
  }, [running]);

  const navigate = (idx) => {
    const clamped = Math.max(0, Math.min(SLIDES.length - 1, idx));
    setSlideIndex(clamped);
    if (syncChannel) syncChannel.postMessage({ type: 'nav', index: clamped });
  };

  const slide     = SLIDES[slideIndex];
  const nextSlide = SLIDES[slideIndex + 1];
  const accent    = ACCENTS[slide.accent] || ACCENTS.purple;
  const mins      = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const secs      = String(elapsed % 60).padStart(2, '0');

  const btnP = {
    fontFamily:"'Inter',sans-serif", fontWeight:700, fontSize:13, letterSpacing:1.5,
    textTransform:"uppercase", cursor:"pointer", border:"none", borderRadius:6,
    padding:"10px 20px", minHeight:44, display:"flex", alignItems:"center", gap:8,
  };

  return (
    <div style={{ background:"#111816", minHeight:"100vh", display:"flex",
      flexDirection:"column", fontFamily:"'Inter',sans-serif", color:C.white }}>

      {/* ── Header bar ── */}
      <div style={{ background:"#0d1411", padding:"12px 20px", display:"flex",
        alignItems:"center", justifyContent:"space-between", gap:16,
        borderBottom:"1px solid rgba(255,255,255,0.08)" }}>
        <div style={{ fontSize:11, letterSpacing:2.5, color:"rgba(255,255,255,0.45)",
          textTransform:"uppercase", fontWeight:600 }}>
          Neurodiversity Works · Presenter View
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:16 }}>
          {/* Timer */}
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ fontFamily:"monospace", fontSize:22, fontWeight:700,
              color:elapsed > 3600 ? "#E05050" : C.white, letterSpacing:2 }}>
              {mins}:{secs}
            </span>
            <button onClick={() => setRunning(r => !r)} style={{
              ...btnP, background:running?"rgba(255,255,255,0.08)":"rgba(84,0,255,0.5)",
              color:C.white, fontSize:11, padding:"6px 12px" }}>
              {running ? "⏸ Pause" : "▶ Start"}
            </button>
            <button onClick={() => { setElapsed(0); setRunning(false); }} style={{
              ...btnP, background:"rgba(255,255,255,0.06)", color:"rgba(255,255,255,0.5)",
              fontSize:11, padding:"6px 12px" }}>
              Reset
            </button>
          </div>
          {/* Slide counter */}
          <div style={{ fontFamily:"monospace", fontSize:16, fontWeight:700,
            color:"rgba(255,255,255,0.6)", letterSpacing:1 }}>
            {slideIndex + 1} / {SLIDES.length}
          </div>
        </div>
      </div>

      {/* ── Progress bar ── */}
      <div style={{ height:3, background:"rgba(255,255,255,0.08)" }}>
        <div style={{ width:`${((slideIndex + 1) / SLIDES.length) * 100}%`,
          height:"100%", background:accent, transition:"width 0.3s ease" }} />
      </div>

      {/* ── Main content ── */}
      <div style={{ flex:1, display:"grid", gridTemplateColumns:"1fr 320px",
        gap:0, overflow:"hidden" }}>

        {/* Left: current slide notes */}
        <div style={{ padding:"28px 32px", display:"flex", flexDirection:"column",
          gap:20, overflowY:"auto", borderRight:"1px solid rgba(255,255,255,0.08)" }}>
          {/* Slide label */}
          <div style={{ display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
            <span style={{ fontSize:10, letterSpacing:2.5, textTransform:"uppercase",
              fontWeight:700, color:accent, background:`${accent}22`,
              padding:"4px 12px", borderRadius:20 }}>
              {getSlideLabel(slide)}
            </span>
            {slide.questionNum && (
              <span style={{ fontSize:10, letterSpacing:2, textTransform:"uppercase",
                fontWeight:700, color:"rgba(255,255,255,0.4)" }}>
                Question {slide.questionNum} of 6
              </span>
            )}
          </div>
          {/* Slide title */}
          <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:24,
            fontWeight:700, color:C.white, lineHeight:1.3, fontStyle:"italic" }}>
            {getSlideTitle(slide)}
          </div>
          {/* Speaker notes */}
          <div style={{ flex:1, background:"rgba(255,255,255,0.04)",
            border:"1px solid rgba(255,255,255,0.08)", borderRadius:10,
            padding:"20px 24px" }}>
            <div style={{ fontSize:10, letterSpacing:2.5, textTransform:"uppercase",
              fontWeight:700, color:"rgba(255,255,255,0.35)", marginBottom:14 }}>
              Speaker Notes
            </div>
            <p style={{ margin:0, fontSize:16, color:"rgba(255,255,255,0.85)",
              lineHeight:1.75, whiteSpace:"pre-wrap" }}>
              {slide.notes || "No notes for this slide."}
            </p>
          </div>
        </div>

        {/* Right: next slide + navigation */}
        <div style={{ padding:"24px 20px", display:"flex", flexDirection:"column",
          gap:20, overflowY:"auto", background:"rgba(0,0,0,0.2)" }}>

          {/* Next slide preview */}
          <div>
            <div style={{ fontSize:10, letterSpacing:2.5, textTransform:"uppercase",
              fontWeight:700, color:"rgba(255,255,255,0.3)", marginBottom:12 }}>
              Up Next
            </div>
            {nextSlide ? (
              <div style={{ background:"rgba(255,255,255,0.05)",
                border:"1px solid rgba(255,255,255,0.1)", borderRadius:10,
                padding:"16px 18px" }}>
                <div style={{ fontSize:10, letterSpacing:2, textTransform:"uppercase",
                  fontWeight:700, color:ACCENTS[nextSlide.accent]||ACCENTS.purple,
                  marginBottom:8 }}>
                  {getSlideLabel(nextSlide)}
                </div>
                <div style={{ fontFamily:"'Playfair Display',Georgia,serif",
                  fontSize:15, fontWeight:700, color:"rgba(255,255,255,0.75)",
                  lineHeight:1.35, fontStyle:"italic" }}>
                  {getSlideTitle(nextSlide)}
                </div>
              </div>
            ) : (
              <div style={{ background:"rgba(255,255,255,0.04)",
                border:"1px dashed rgba(255,255,255,0.12)", borderRadius:10,
                padding:"16px 18px", color:"rgba(255,255,255,0.25)",
                fontSize:13, fontStyle:"italic" }}>
                End of deck
              </div>
            )}
          </div>

          {/* Navigation */}
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            <div style={{ fontSize:10, letterSpacing:2.5, textTransform:"uppercase",
              fontWeight:700, color:"rgba(255,255,255,0.3)", marginBottom:2 }}>
              Navigate
            </div>
            <button onClick={() => navigate(slideIndex - 1)}
              disabled={slideIndex === 0}
              style={{ ...btnP, background:"rgba(255,255,255,0.07)", color:C.white,
                opacity:slideIndex===0?0.3:1, justifyContent:"center",
                cursor:slideIndex===0?"not-allowed":"pointer" }}>
              ← Previous
            </button>
            <button onClick={() => navigate(slideIndex + 1)}
              disabled={slideIndex === SLIDES.length - 1}
              style={{ ...btnP, background:accent, color:C.white,
                opacity:slideIndex===SLIDES.length-1?0.3:1, justifyContent:"center",
                cursor:slideIndex===SLIDES.length-1?"not-allowed":"pointer" }}>
              Next →
            </button>
            <button onClick={() => navigate(0)} style={{
              ...btnP, background:"transparent", color:"rgba(255,255,255,0.35)",
              fontSize:11, justifyContent:"center",
              border:"1px solid rgba(255,255,255,0.12)" }}>
              ↺ Restart
            </button>
          </div>

          {/* Mini slide strip */}
          <div>
            <div style={{ fontSize:10, letterSpacing:2.5, textTransform:"uppercase",
              fontWeight:700, color:"rgba(255,255,255,0.3)", marginBottom:10 }}>
              All Slides
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:4,
              maxHeight:240, overflowY:"auto" }}>
              {SLIDES.map((s, i) => (
                <button key={i} onClick={() => navigate(i)} style={{
                  display:"flex", alignItems:"center", gap:10, padding:"6px 10px",
                  background:i===slideIndex?"rgba(255,255,255,0.12)":"transparent",
                  border:`1px solid ${i===slideIndex?"rgba(255,255,255,0.2)":"transparent"}`,
                  borderRadius:6, cursor:"pointer", textAlign:"left", width:"100%" }}>
                  <span style={{ fontFamily:"monospace", fontSize:10,
                    color:"rgba(255,255,255,0.35)", minWidth:20 }}>{i+1}</span>
                  <span style={{ fontSize:11, color:i===slideIndex?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.45)",
                    fontWeight:i===slideIndex?600:400, lineHeight:1.3,
                    overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                    {getSlideTitle(s) || getSlideLabel(s)}
                  </span>
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(IS_PRESENTER ? <PresenterView /> : <Presentation />);
</script>
</body>
</html>
